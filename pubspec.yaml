name: cirio_app
description: App informativo sobre o Círio de Nazaré — Belém do Pará.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_dotenv: ^6.0.1
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  flutter_map: ^8.3.1
  latlong2: ^0.10.1
  http: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/
    - assets/news/
    - assets/embeddings.json
    - .env

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
